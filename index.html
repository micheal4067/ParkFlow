<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkFlow</title>

  <!-- Main Styles -->
   <link rel="icon" href="./images/title-icon.png" type="image/png">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/all.min.css"/>
  <script src="js/chart.umd.min.js"></script>
</head>

<body>

  <!-- Layout Container -->
  <div class="layout">

    <!-- Sidebar placeholder (loaded dynamically) -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <main class="main">

      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <div class="header-title"><br>
            <h1>Car Park Analytics</h1>
            <p>New Kuje Shopping Complex Car park Monitoring System</p>
          </div>
        </div>
      </header>

      <!-- KPI Cards Section -->
      <section class="kpi-grid">

        <div class="kpi-card gradient2">
          <div class="kpi-icon"><i class="fa fa-chart-line"></i></div>
          <div>
            <span>Year Revenue</span>
            <h2 id="monthSales">₦0</h2>
          </div>
        </div>

        <div class="kpi-card gradient4">
          <div class="kpi-icon"><i class="fa fa-users"></i></div>
          <div>
            <span>Current Staff Members</span>
            <h2 id="staffCount">0</h2>
          </div>
        </div>
      </section>

      <!-- Charts Section -->
       <section class="charts">
            <div class="chart-card">
                <h3>Monthly Revenue Trend</h3>
                <canvas id="monthlyRevenueChart" style="height:300px;"></canvas>
            </div>

            <div class="chart-card">
                <h3>Monthly Ticket Distribution</h3>
                <canvas id="ticketDistributionChart" style="height:300px;"></canvas>
            </div>

        </section>

    </main>
  </div>

  <!-- Scripts -->
  <script src="js/layout.js"></script>
  <script type="module" src="js/dashboard.js"></script>

  <script>
    // Toggle mobile menu
    function toggleMenu() {
      const menu = document.getElementById("mobileMenu");
      if (menu) menu.classList.toggle("open");
    }
  </script>

</body>
</html>
